version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kira-memory
    environment:
      POSTGRES_USER: kira
      POSTGRES_PASSWORD: kira
      POSTGRES_DB: kiradb
    ports:
      - "5432:5432"
    volumes:
      - kira_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  kira_pgdata:
